<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B4A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Companiio" />

    <!-- SEO -->
    <title>Companiio - Never Run Out of Plans | Discover Canadian Venues</title>
    <meta name="description" content="Discover, plan, and book the best restaurants, activities, and experiences across Canada. Never run out of plans with Companiio." />
    <meta name="keywords" content="restaurants, activities, venues, Toronto, Vancouver, Montreal, Canada, date night, things to do, booking, deals" />
    <meta name="author" content="Companiio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://companiio.com" />
    <meta property="og:title" content="Companiio - Never Run Out of Plans" />
    <meta property="og:description" content="Discover, plan, and book the best restaurants, activities, and experiences across Canada." />
    <meta property="og:image" content="https://companiio.com/icon-512.png" />
    <meta property="og:site_name" content="Companiio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://companiio.com" />
    <meta name="twitter:title" content="Companiio - Never Run Out of Plans" />
    <meta name="twitter:description" content="Discover, plan, and book the best restaurants, activities, and experiences across Canada." />
    <meta name="twitter:image" content="https://companiio.com/icon-512.png" />

    <!-- Favicon & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            reg.onupdatefound = function() {
              var installingWorker = reg.installing;
              installingWorker.onstatechange = function() {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('New content available, please refresh.');
                }
              };
            };
          }).catch(function(err) {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
